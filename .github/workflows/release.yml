name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build zip
        run: npm run build:zip

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create or replace release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ZIP="build/prevent-duplicate-tabs-${VERSION}.zip"
          gh release delete "latest" --yes 2>/dev/null || true
          gh release create "latest" "$ZIP" --title "v${VERSION}" --notes "Chrome extension that prevents opening duplicate tabs. Install the attached .zip in Chrome (chrome://extensions → Load unpacked, or drag the zip)."
